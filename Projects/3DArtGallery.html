<!DOCTYPE html>

    <div id="Blender-bg" class="project-bg"></div>

        <img src="../assets/3DArtGallery/XM5-3.jpg" class="masonry-item zoomable">

        <img src="../assets/3DArtGallery/XM5-5.jpg" class="masonry-item zoomable">
    </div>

    <div class="section-divider"></div>

    <h4 class="section-subheading">Mossberg Shotgun</h4>
    <div class="masonry-gallery">
        <img src="../assets/3DArtGallery/mossberg1.jpg" class="masonry-item zoomable">
        <img src="../assets/3DArtGallery/mossberg2.jpg" class="masonry-item zoomable">
    </div>

    <div class="section-divider"></div>

    <div class="section-divider"></div>

    <div class="masonry-gallery">
        <img src="../assets/3DArtGallery/Torch1.png" class="masonry-item zoomable">
        <img src="../assets/3DArtGallery/Torch2.png" class="masonry-item zoomable">

    </div>

    <div class="section-divider"></div>

</section>

    <section class="project-tools-section">

        <div class="project-tools-grid">

            <div class="detail-tool-card">
                <img src="../assets/Logos/Blender.png" alt="Blender" class="detail-tool-logo">

            </div>

            <!-- Zurück-Button -->
        <div class="button-wrapper back-button-container">

        </div>

        <div id="side-back-button" class="side-back-btn">
            <a href="../index.html">← Portfolio</a>
        </div>
